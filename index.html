<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Blue Shield OS | Elite Hub</title>
    <style>
        :root {
            --bg: #0a0c10;
            --sidebar: #11141b;
            --accent: #00a2ff;
            --danger: #ff4444;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body { margin: 0; display: flex; height: 100vh; background: var(--bg); color: white; font-family: 'Inter', sans-serif; }

        /* Barra Lateral Pro */
        .sidebar {
            width: 70px;
            background: var(--sidebar);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            border-right: 1px solid var(--glass);
            transition: width 0.3s;
        }
        .sidebar:hover { width: 200px; }
        .sidebar:hover .nav-label { display: block; }

        .nav-item {
            width: 80%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            transition: 0.3s;
        }
        .nav-item:hover { background: var(--accent); }
        .nav-label { display: none; margin-left: 10px; font-weight: 600; white-space: nowrap; }

        /* Contenedor Principal */
        .main-content { flex: 1; display: flex; flex-direction: column; }

        .top-bar {
            background: var(--sidebar);
            padding: 15px 25px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 2px solid var(--accent);
        }

        #urlBar {
            flex: 1;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--glass);
            border-radius: 25px;
            padding: 10px 20px;
            color: var(--accent);
            font-family: 'Consolas', monospace;
            outline: none;
        }

        iframe { width: 100%; height: 100%; border: none; background: #fff; }

        .shield-active { color: #00ff88; font-weight: bold; font-size: 0.8em; border: 1px solid #00ff88; padding: 4px 8px; border-radius: 20px; }
    </style>
</head>
<body>

<div class="sidebar">
    <img src="logo.jpg" style="width: 40px; border-radius: 8px; margin-bottom: 30px;">
    <div class="nav-item" onclick="load('https://search.brave.com')">🌐<span class="nav-label">Brave Search</span></div>
    <div class="nav-item" onclick="load('TU_REPOS_URL_DE_CARPETA_SEGURA')">🔐<span class="nav-label">Carpeta Segura</span></div>
    <div class="nav-item" onclick="load('TU_REPOS_URL_DE_GENERADOR')">🔑<span class="nav-label">PassGen Pro</span></div>
    <div class="nav-item" onclick="load('https://virustotal.com')">🛡️<span class="nav-label">VirusTotal</span></div>
</div>

<div class="main-content">
    <div class="top-bar">
        <span class="shield-active">SHIELD v2.0 ACTIVE</span>
        <input type="text" id="urlBar" placeholder="Introduce URL o comando de búsqueda...">
        <button onclick="nav()" style="background: var(--accent); border:none; color:white; padding:10px 20px; border-radius:20px; cursor:pointer; font-weight:bold;">EJECUTAR</button>
    </div>
    <iframe id="view" src="https://search.brave.com"></iframe>
</div>

<script>
    function nav() {
        let val = document.getElementById('urlBar').value;
        let url = val.includes('.') ? (val.startsWith('http') ? val : 'https://'+val) : 'https://search.brave.com/search?q='+val;
        document.getElementById('view').src = url;
    }
    function load(url) { document.getElementById('view').src = url; }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Blue Shield Elite | Web OS</title>
    <style>
        :root { --bg: #0d1117; --bar: #161b22; --accent: #3081f7; --text: #c9d1d9; }
        body { margin: 0; display: flex; height: 100vh; background: var(--bg); font-family: 'Segoe UI', sans-serif; color: white; overflow: hidden; }
        
        /* Sidebar con Scroll para tantas webs */
        .sidebar { width: 80px; background: var(--bar); display: flex; flex-direction: column; align-items: center; padding: 15px 0; border-right: 1px solid #30363d; transition: 0.3s; overflow-y: auto; }
        .sidebar:hover { width: 220px; }
        .sidebar::-webkit-scrollbar { width: 3px; }

        .logo { width: 50px; border-radius: 10px; margin-bottom: 20px; border: 2px solid var(--accent); }
        
        .nav-item { width: 85%; padding: 12px; margin: 4px 0; border-radius: 10px; cursor: pointer; display: flex; align-items: center; transition: 0.2s; white-space: nowrap; }
        .nav-item:hover { background: var(--accent); color: white; }
        .nav-text { display: none; margin-left: 15px; font-weight: 500; font-size: 0.9em; }
        .sidebar:hover .nav-text { display: block; }

        /* Main Area */
        .main { flex: 1; display: flex; flex-direction: column; }
        .top-bar { background: var(--bar); padding: 12px 20px; display: flex; gap: 10px; align-items: center; }
        input { flex: 1; background: #010409; border: 1px solid #30363d; border-radius: 20px; padding: 10px 15px; color: #58a6ff; outline: none; }
        
        .view-container { flex: 1; background: #f0f0f0; position: relative; }
        iframe { width: 100%; height: 100%; border: none; }
        
        .status-badge { font-size: 0.7em; background: #238636; padding: 4px 10px; border-radius: 15px; }
    </style>
</head>
<body>

<div class="sidebar">
    <img src="logo.jpg" class="logo">
    <div class="nav-item" onclick="openWeb('https://gemini.google.com')">✨ <span class="nav-text">Gemini AI</span></div>
    <div class="nav-item" onclick="openWeb('https://aistudio.google.com')">🤖 <span class="nav-text">AI Studio</span></div>
    <div class="nav-item" onclick="openWeb('https://mail.google.com')">📧 <span class="nav-text">Gmail</span></div>
    <div class="nav-item" onclick="openWeb('https://drive.google.com')">☁️ <span class="nav-text">Drive</span></div>
    <div class="nav-item" onclick="openWeb('https://github.com')">🐙 <span class="nav-text">GitHub</span></div>
    <div class="nav-item" onclick="openWeb('https://lovable.dev')">💛 <span class="nav-text">Lovable</span></div>
    <div class="nav-item" onclick="openWeb('https://jsfiddle.net')">🎻 <span class="nav-text">JSFiddle</span></div>
    <div class="nav-item" onclick="openWeb('https://codepen.io')">🖋️ <span class="nav-text">CodePen</span></div>
    <div class="nav-item" onclick="openWeb('https://www.passwordmonster.com')">👾 <span class="nav-text">Pass Monster</span></div>
    <div class="nav-item" onclick="openWeb('https://iplogger.org/es/')">📍 <span class="nav-text">IP Logger</span></div>
    <div class="nav-item" onclick="openWeb('https://technical.city/es')">💻 <span class="nav-text">Tech City</span></div>
    <div class="nav-item" onclick="openWeb('https://learn-anything.xyz')">🧠 <span class="nav-text">Learn Anything</span></div>
</div>

<div class="main">
    <div class="top-bar">
        <div class="status-badge">SHIELD SECURE</div>
        <input type="text" id="urlInput" placeholder="Pega un link o busca...">
        <button onclick="navigate()" style="background:var(--accent); color:white; border:none; padding:10px 20px; border-radius:20px; cursor:pointer;">IR</button>
    </div>
    <div class="view-container">
        <iframe id="viewport" src="https://jsfiddle.net"></iframe>
    </div>
</div>

<script>
    function openWeb(url) {
        const viewport = document.getElementById('viewport');
        // Lista de webs que SIEMPRE bloquean iframes
        const protected = ['google.com', 'github.com', 'lovable.dev', 'aistudio'];
        
        const isProtected = protected.some(d => url.includes(d));
        
        if (isProtected) {
            // Abrimos en una ventana nueva pero controlada
            window.open(url, '_blank', 'width=1200,height=800');
        } else {
            viewport.src = url;
        }
    }

    function navigate() {
        let val = document.getElementById('urlInput').value;
        if(!val.startsWith('http')) val = 'https://' + val;
        openWeb(val);
    }
</script>
</body>
</html>

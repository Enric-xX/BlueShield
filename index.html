<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Blue Shield | Elite Edition</title>
    <style>
        :root {
            --bg: #0d1117;
            --bar: #161b22;
            --accent: #3081f7;
            --text: #c9d1d9;
        }

        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); font-family: 'Segoe UI', sans-serif; overflow: hidden; }

        .navbar {
            background: var(--bar);
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 2px solid var(--accent);
        }

        /* ESPACIO PARA TU LOGO */
        .logo {
            height: 30px;
            cursor: pointer;
        }

        #urlInput {
            flex: 1;
            background: #010409;
            border: 1px solid #30363d;
            border-radius: 20px;
            padding: 8px 15px;
            color: #58a6ff;
            outline: none;
            font-family: 'Consolas', monospace;
        }

        .btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover { background: #1f6feb; transform: scale(1.05); }

        .browser-container {
            height: calc(100vh - 60px);
            width: 100%;
            background: white;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

<div class="navbar">
    <img src="https://img.icons8.com/fluency/48/shield.png" class="logo" alt="Blue Shield">
    <b style="color: var(--accent); font-size: 1.2em;">BLUE SHIELD</b>
    
    <input type="text" id="urlInput" placeholder="Busca en Brave o introduce URL...">
    
    <button class="btn" onclick="navigate()">NAVEGAR</button>
    <button class="btn" style="background:#21262d" onclick="location.reload()">🔄</button>
</div>

<div class="browser-container">
    <iframe id="viewport" src="https://search.brave.com"></iframe>
</div>

<script>
    const urlInput = document.getElementById('urlInput');
    const viewport = document.getElementById('viewport');

    function navigate() {
        let val = urlInput.value.trim();
        if (!val) return;

        let url;
        // Si no tiene puntos o parece una búsqueda, usamos Brave Search
        if (!val.includes('.') || val.includes(' ')) {
            url = `https://search.brave.com/search?q=${encodeURIComponent(val)}`;
        } else {
            url = val.startsWith('http') ? val : 'https://' + val;
        }
        
        viewport.src = url;
    }

    urlInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") navigate();
    });
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blue Shield | Elite Network OS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0c10;
            --sidebar: #0d1117;
            --accent: #3081f7;
            --glass: rgba(255, 255, 255, 0.05);
            --text-dim: #8b949e;
        }

        body { 
            margin: 0; display: flex; height: 100vh; 
            background: var(--bg); color: white; 
            font-family: 'Inter', sans-serif; overflow: hidden; 
        }

        /* --- SIDEBAR ELITE --- */
        .sidebar {
            width: 75px; background: var(--sidebar);
            display: flex; flex-direction: column; align-items: center;
            padding: 20px 0; border-right: 1px solid var(--glass);
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000; overflow-y: auto; overflow-x: hidden;
        }
        .sidebar:hover { width: 230px; }
        .sidebar::-webkit-scrollbar { width: 3px; }

        .logo-box { 
            width: 45px; height: 45px; border-radius: 12px; 
            margin-bottom: 30px; border: 2px solid var(--accent); 
            cursor: pointer; transition: 0.3s; overflow: hidden;
            flex-shrink: 0;
        }
        .logo-box img { width: 100%; height: 100%; object-fit: cover; }

        .nav-item {
            width: 88%; padding: 12px; margin: 3px 0;
            border-radius: 12px; cursor: pointer;
            display: flex; align-items: center; transition: 0.2s;
            color: var(--text-dim);
        }
        .nav-item:hover { background: rgba(255, 255, 255, 0.03); color: white; }
        .nav-icon { font-size: 1.2em; min-width: 30px; text-align: center; }
        .nav-text { display: none; margin-left: 15px; font-weight: 600; white-space: nowrap; font-size: 0.85em; }
        .sidebar:hover .nav-text { display: block; }

        hr { width: 60%; border: 0; border-top: 1px solid var(--glass); margin: 10px 0; }

        /* --- CONTENIDO PRINCIPAL --- */
        .main { flex: 1; display: flex; flex-direction: column; position: relative; }

        .top-bar {
            background: var(--sidebar); padding: 12px 25px;
            display: flex; align-items: center; gap: 15px;
            border-bottom: 1px solid var(--glass);
            z-index: 50;
        }

        #urlInput {
            flex: 1; background: #010409; border: 1px solid #30363d;
            border-radius: 20px; padding: 10px 18px; color: var(--accent);
            outline: none; font-family: monospace;
        }

        .btn-exe {
            background: var(--accent); color: white; border: none;
            padding: 10px 22px; border-radius: 20px;
            cursor: pointer; font-weight: bold; transition: 0.2s;
        }
        .btn-exe:hover { transform: scale(1.05); filter: brightness(1.1); }

        /* --- PÁGINA DE INICIO --- */
        #home-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #11141b 0%, #0a0c10 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; transition: 0.5s ease;
        }
        .home-logo { width: 110px; border-radius: 20px; margin-bottom: 20px; border: 2px solid var(--accent); }
        .home-title { margin: 0; font-size: 3em; font-weight: 800; letter-spacing: -2px; }
        .home-subtitle { color: var(--accent); font-weight: bold; letter-spacing: 4px; margin-bottom: 35px; font-size: 0.8em; }

        .search-container { width: 550px; }
        .search-container input {
            width: 100%; padding: 18px 25px; border-radius: 35px;
            background: #161b22; border: 1px solid #30363d;
            color: white; font-size: 1.1em; outline: none; transition: 0.3s;
            text-align: center;
        }
        .search-container input:focus { border-color: var(--accent); box-shadow: 0 0 30px rgba(48, 129, 247, 0.15); }

        /* --- AREA DEL NAVEGADOR --- */
        .view-body { flex: 1; background: white; }
        iframe { width: 100%; height: 100%; border: none; }
        
        .hidden { opacity: 0; pointer-events: none; transform: translateY(20px); }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo-box" onclick="goHome()">
            <img src="logo.jpg" alt="Blue Shield Logo">
        </div>
        
        <div class="nav-item" onclick="openWeb('https://grok.com')">
            <span class="nav-icon">🤖</span><span class="nav-text">Grok AI</span>
        </div>
        <div class="nav-item" onclick="openWeb('https://aistudio.google.com')">
            <span class="nav-icon">🔬</span><span class="nav-text">AI Studio</span>
        </div>
        <div class="nav-item" onclick="openWeb('https://lovable.dev')">
            <span class="nav-icon">💛</span><span class="nav-text">Lovable.dev</span>
        </div>

        <hr>

        <div class="nav-item" onclick="openWeb('https://mail.google.com')">
            <span class="nav-icon">📧</span><span class="nav-text">Gmail</span>
        </div>
        <div class="nav-item" onclick="openWeb('https://drive.google.com')">
            <span class="nav-icon">☁️</span><span class="nav-text">Drive</span>
        </div>
        <div class="nav-item" onclick="openWeb('https://github.com')">
            <span class="nav-icon">🐙</span><span class="nav-text">GitHub</span>
        </div>
        <div class="nav-item" onclick="openWeb('https://jsfiddle.net')">
            <span class="nav-icon">🎻</span><span class="nav-text">JSFiddle</span>
        </div>

        <hr>

        <div class="nav-item" onclick="openWeb('https://www.passwordmonster.com')">
            <span class="nav-icon">👾</span><span class="nav-text">Pass Monster</span>
        </div>
        <div class="nav-item" onclick="openWeb('https://iplogger.org/es/')">
            <span class="nav-icon">📍</span><span class="nav-text">IP Logger</span>
        </div>
        <div class="nav-item" onclick="openWeb('https://technical.city/es')">
            <span class="nav-icon">📊</span><span class="nav-text">Tech City</span>
        </div>
        <div class="nav-item" onclick="openWeb('https://learn-anything.xyz')">
            <span class="nav-icon">🧠</span><span class="nav-text">Learn Anything</span>
        </div>
    </div>

    <div class="main">
        <div class="top-bar">
            <button onclick="goHome()" style="background:none; border:none; color:var(--accent); cursor:pointer; font-size:1.5em;">🏠</button>
            <input type="text" id="urlInput" placeholder="Navegando bajo protocolo Blue Shield...">
            <button class="btn-exe" onclick="navigate('urlInput')">EJECUTAR</button>
        </div>

        <div id="home-screen">
            <img src="logo.jpg" class="home-logo">
            <h1 class="home-title">BLUE <span style="color:var(--accent)">SHIELD</span></h1>
            <p class="home-subtitle">ELITE NETWORK OS</p>
            <div class="search-container">
                <input type="text" id="homeSearch" placeholder="¿Qué protocolo vamos a auditar hoy, Enric?">
            </div>
        </div>

        <div class="view-body">
            <iframe id="viewport" src="about:blank"></iframe>
        </div>
    </div>

    <script>
        const home = document.getElementById('home-screen');
        const viewport = document.getElementById('viewport');
        const urlInput = document.getElementById('urlInput');
        const homeSearch = document.getElementById('homeSearch');

        // Lógica de navegación inteligente
        function openWeb(url) {
            // Webs que bloquean el iframe (con las correcciones de Grok e IP Logger)
            const forbidden = ['google.com', 'github.com', 'lovable.dev', 'aistudio', 'grok.com', 'iplogger.org', 'x.com'];
            const needsPopUp = forbidden.some(d => url.includes(d));

            home.classList.add('hidden');

            if (needsPopUp) {
                // Abre una ventana dedicada que parece una App
                window.open(url, '_blank', 'width=1200,height=800,location=no,status=no,menubar=no');
            } else {
                viewport.src = url;
            }
        }

        function navigate(inputId) {
            let val = document.getElementById(inputId).value.trim();
            if (!val) return;
            
            let url = (val.includes('.') && !val.includes(' ')) ? 
                (val.startsWith('http') ? val : 'https://' + val) : 
                'https://www.bing.com/search?q=' + encodeURIComponent(val);
            
            openWeb(url);
        }

        function goHome() {
            home.classList.remove('hidden');
            viewport.src = "about:blank";
            urlInput.value = "";
            homeSearch.value = "";
        }

        // Listeners de teclado
        homeSearch.addEventListener("keypress", (e) => { if (e.key === "Enter") navigate('homeSearch'); });
        urlInput.addEventListener("keypress", (e) => { if (e.key === "Enter") navigate('urlInput'); });
    </script>
</body>
</html>

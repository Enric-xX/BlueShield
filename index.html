<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Blue Shield | Navigator v1.0</title>
    <style>
        :root {
            --bg: #0d1117;
            --bar: #161b22;
            --accent: #3081f7;
            --text: #c9d1d9;
            --danger: #f85149;
        }

        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); font-family: 'Segoe UI', sans-serif; overflow: hidden; }

        /* Barra de navegación */
        .navbar {
            background: var(--bar);
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 2px solid var(--accent);
        }

        #urlInput {
            flex: 1;
            background: #010409;
            border: 1px solid #30363d;
            border-radius: 20px;
            padding: 8px 15px;
            color: var(--accent);
            outline: none;
        }

        .btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        /* El Escudo (Anti-Phishing) */
        #shield-status {
            font-size: 0.8em;
            padding: 5px 10px;
            border-radius: 4px;
            background: #238636;
            color: white;
        }

        /* Área del navegador */
        .browser-container {
            height: calc(100vh - 60px);
            width: 100%;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: white;
        }
    </style>
</head>
<body>

<div class="navbar">
    <div id="shield-status">🛡️ SHIELD: OK</div>
    <input type="text" id="urlInput" placeholder="Introduce una URL o busca en Blue Shield...">
    <button class="btn" onclick="navigate()">IR</button>
</div>

<div class="browser-container">
    <iframe id="viewport" src="https://www.google.com/search?igu=1"></iframe>
</div>

<script>
    const urlInput = document.getElementById('urlInput');
    const viewport = document.getElementById('viewport');
    const shield = document.getElementById('shield-status');

    // Lista negra de palabras sospechosas (Anti-Phishing)
    const blacklist = ['login', 'free-skins', 'steam-giveaway', 'hack', 'password'];

    function navigate() {
        let url = urlInput.value.trim();
        
        // Comprobación de seguridad Blue Shield
        const isSuspicious = blacklist.some(word => url.toLowerCase().includes(word));
        
        if (isSuspicious) {
            shield.innerText = "⚠️ AMENAZA DETECTADA";
            shield.style.background = "#f85149";
            if(!confirm("Blue Shield ha detectado palabras sospechosas. ¿Quieres entrar bajo tu riesgo?")) {
                return;
            }
        } else {
            shield.innerText = "🛡️ SHIELD: OK";
            shield.style.background = "#238636";
        }

        if (!url.startsWith('http')) {
            url = 'https://' + url;
        }
        
        viewport.src = url;
    }

    // Navegar al dar a Enter
    urlInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") navigate();
    });
</script>

</body>
</html>

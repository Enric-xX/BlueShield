<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Blue Shield | Elite Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0c10;
            --sidebar: #0d1117;
            --accent: #3081f7;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body { 
            margin: 0; display: flex; height: 100vh; 
            background: var(--bg); color: white; 
            font-family: 'Inter', sans-serif; overflow: hidden; 
        }

        /* --- LOGIN SYSTEM --- */
        #auth-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .auth-card {
            background: var(--sidebar); padding: 40px; border-radius: 20px;
            border: 1px solid var(--accent); text-align: center; width: 300px;
        }
        .auth-card input {
            width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px;
            border: 1px solid #30363d; background: #010409; color: white; outline: none;
        }
        .auth-card button {
            width: 100%; padding: 12px; background: var(--accent); border: none;
            color: white; font-weight: bold; border-radius: 8px; cursor: pointer;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 75px; background: var(--sidebar);
            display: flex; flex-direction: column; align-items: center;
            padding: 20px 0; border-right: 1px solid var(--glass);
            transition: width 0.3s; z-index: 100;
        }
        .sidebar:hover { width: 230px; }
        
        .nav-item {
            width: 85%; padding: 12px; margin: 5px 0; border-radius: 12px;
            display: flex; align-items: center; cursor: pointer; transition: 0.2s;
            color: #8b949e; overflow: hidden;
        }
        .nav-item:hover { background: var(--glass); color: white; }
        .nav-icon { min-width: 35px; font-size: 1.2em; text-align: center; }
        .nav-text { margin-left: 15px; font-weight: 600; white-space: nowrap; display: none; }
        .sidebar:hover .nav-text { display: block; }

        /* --- MAIN CONTENT --- */
        .main { flex: 1; display: flex; flex-direction: column; }
        .top-bar { padding: 15px; background: var(--sidebar); display: flex; gap: 10px; border-bottom: 1px solid var(--glass); }
        #url-bar { flex: 1; background: #010409; border: 1px solid #30363d; border-radius: 10px; color: var(--accent); padding: 8px 15px; }

        #home-screen {
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: radial-gradient(circle, #11141b 0%, #0a0c10 100%);
        }
        .search-box { width: 500px; padding: 15px; border-radius: 30px; background: #161b22; border: 1px solid #30363d; color: white; text-align: center; font-size: 1.1em; outline: none; }
        
        iframe { width: 100%; height: 100%; border: none; background: white; display: none; }
        .active-view iframe { display: block; }
        .active-view #home-screen { display: none; }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div class="auth-card">
            <h2 style="color:var(--accent)">BLUE SHIELD</h2>
            <p>Introduce clave de acceso</p>
            <input type="password" id="access-key" placeholder="••••••••">
            <button onclick="login()">ENTRAR</button>
        </div>
    </div>

    <div class="sidebar">
        <div class="nav-item" onclick="location.reload()">
            <span class="nav-icon">🏠</span><span class="nav-text">Inicio</span>
        </div>
        <div class="nav-item" onclick="openWeb('https://grok.com')">
            <span class="nav-icon">✖️</span><span class="nav-text">Grok AI</span>
        </div>
        <div class="nav-item" onclick="openWeb('https://iplogger.org')">
            <span class="nav-icon">📍</span><span class="nav-text">IP Logger</span>
        </div>
        <div class="nav-item" onclick="openWeb('https://github.com')">
            <span class="nav-icon">🐙</span><span class="nav-text">GitHub</span>
        </div>
    </div>

    <div class="main" id="app-content">
        <div class="top-bar">
            <input type="text" id="url-bar" placeholder="Navega bajo protocolo Blue Shield...">
            <button onclick="navigate()" style="background:var(--accent); border:none; color:white; padding:5px 20px; border-radius:10px; cursor:pointer;">EJECUTAR</button>
        </div>
        
        <div id="home-screen">
            <h1 style="font-size:3em; margin-bottom:10px;">BLUE <span style="color:var(--accent)">SHIELD</span></h1>
            <p style="color:var(--accent); letter-spacing:5px; margin-bottom:30px;">ELITE NETWORK OS</p>
            <input type="text" id="home-search" class="search-box" placeholder="¿Qué protocolo vamos a auditar hoy, Enric?">
        </div>

        <iframe id="viewport" src=""></iframe>
    </div>

    <script>
        function login() {
            const key = document.getElementById('access-key').value;
            if(key === "1234") { // Cambia 1234 por tu clave
                document.getElementById('auth-overlay').style.display = 'none';
            } else {
                alert("Acceso denegado");
            }
        }

        function openWeb(url) {
            const forbidden = ['github.com', 'grok.com', 'google.com'];
            const isForbidden = forbidden.some(d => url.includes(d));
            
            if(isForbidden) {
                window.open(url, '_blank');
            } else {
                document.body.classList.add('active-view');
                document.getElementById('viewport').src = url;
            }
        }

        function navigate() {
            const val = document.getElementById('url-bar').value;
            openWeb(val.startsWith('http') ? val : 'https://' + val);
        }

        document.getElementById('home-search').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') {
                document.getElementById('url-bar').value = e.target.value;
                navigate();
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Blue Shield | Control Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0c10;
            --sidebar: #11141b;
            --accent: #3081f7;
            --glass: rgba(255, 255, 255, 0.05);
            --text: #c9d1d9;
        }

        body { 
            margin: 0; display: flex; height: 100vh; 
            background: var(--bg); color: white; 
            font-family: 'Inter', sans-serif; overflow: hidden; 
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 70px; background: var(--sidebar);
            display: flex; flex-direction: column; align-items: center;
            padding: 20px 0; border-right: 1px solid var(--glass);
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 100; overflow-y: auto; overflow-x: hidden;
        }
        .sidebar:hover { width: 220px; }
        .sidebar::-webkit-scrollbar { width: 2px; }

        .logo-nav { width: 45px; height: 45px; border-radius: 10px; cursor: pointer; transition: 0.3s; border: 1px solid var(--accent); }
        .logo-nav:hover { transform: rotate(10deg) scale(1.1); }

        .nav-item {
            width: 85%; padding: 12px; margin: 4px 0;
            border-radius: 12px; cursor: pointer;
            display: flex; align-items: center; transition: 0.2s;
        }
        .nav-item:hover { background: var(--accent); color: white; }
        .nav-label { display: none; margin-left: 15px; font-weight: 600; white-space: nowrap; font-size: 0.85em; }
        .sidebar:hover .nav-label { display: block; }

        /* --- CONTENIDO --- */
        .main { flex: 1; display: flex; flex-direction: column; position: relative; }

        .top-bar {
            background: var(--sidebar); padding: 10px 20px;
            display: flex; align-items: center; gap: 15px;
            border-bottom: 1px solid var(--glass);
        }

        #urlInput {
            flex: 1; background: #010409; border: 1px solid #30363d;
            border-radius: 20px; padding: 8px 15px; color: var(--accent);
            outline: none; font-family: monospace;
        }

        /* --- PÁGINA DE INICIO (HOME) --- */
        #home-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #161b22 0%, #0a0c10 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 10; transition: 0.5s;
        }

        .home-logo { width: 120px; border-radius: 25px; margin-bottom: 20px; box-shadow: 0 0 30px rgba(48, 129, 247, 0.4); }
        .home-title { font-size: 2.5em; font-weight: 800; color: white; margin-bottom: 30px; letter-spacing: -1px; }
        .home-title span { color: var(--accent); }

        .search-container { width: 600px; position: relative; }
        .search-container input {
            width: 100%; padding: 18px 25px; border-radius: 30px;
            background: #161b22; border: 2px solid #30363d;
            color: white; font-size: 1.1em; outline: none; transition: 0.3s;
        }
        .search-container input:focus { border-color: var(--accent); box-shadow: 0 0 20px rgba(48, 129, 247, 0.2); }

        /* --- VISOR --- */
        iframe { width: 100%; height: 100%; border: none; background: white; }

        .hidden { opacity: 0; pointer-events: none; transform: scale(1.1); }
    </style>
</head>
<body>

    <div class="sidebar">
        <img src="logo.jpg" class="logo-nav" onclick="goHome()">
        <div style="margin-bottom: 20px;"></div>
        
        <div class="nav-item" onclick="openWeb('https://gemini.google.com')">✨ <span class="nav-text">Gemini AI</span></div>
        <div class="nav-item" onclick="openWeb('https://aistudio.google.com')">🤖 <span class="nav-text">AI Studio</span></div>
        <div class="nav-item" onclick="openWeb('https://mail.google.com')">📧 <span class="nav-text">Gmail</span></div>
        <div class="nav-item" onclick="openWeb('https://drive.google.com')">☁️ <span class="nav-text">Google Drive</span></div>
        <div class="nav-item" onclick="openWeb('https://github.com')">🐙 <span class="nav-text">GitHub</span></div>
        <div class="nav-item" onclick="openWeb('https://lovable.dev')">💛 <span class="nav-text">Lovable.dev</span></div>
        <div class="nav-item" onclick="openWeb('https://jsfiddle.net')">🎻 <span class="nav-text">JSFiddle</span></div>
        <div class="nav-item" onclick="openWeb('https://codepen.io')">🖋️ <span class="nav-text">CodePen</span></div>
        <div class="nav-item" onclick="openWeb('https://www.passwordmonster.com')">👾 <span class="nav-text">Pass Monster</span></div>
        <div class="nav-item" onclick="openWeb('https://iplogger.org/es/')">📍 <span class="nav-text">IP Logger</span></div>
        <div class="nav-item" onclick="openWeb('https://technical.city/es')">📊 <span class="nav-text">Technical City</span></div>
        <div class="nav-item" onclick="openWeb('https://learn-anything.xyz')">🧠 <span class="nav-text">Learn Anything</span></div>
    </div>

    <div class="main">
        <div class="top-bar">
            <button onclick="goHome()" style="background:none; border:none; color:var(--accent); cursor:pointer; font-size:1.2em;">🏠</button>
            <input type="text" id="urlInput" placeholder="Introduce URL o busca...">
            <button onclick="navigate('urlInput')" style="background:var(--accent); border:none; color:white; padding:8px 15px; border-radius:15px; cursor:pointer; font-weight:bold;">IR</button>
        </div>

        <div id="home-screen">
            <img src="logo.jpg" class="home-logo">
            <h1 class="home-title">BLUE <span>SHIELD</span></h1>
            <div class="search-container">
                <input type="text" id="homeSearch" placeholder="¿Qué quieres investigar hoy, Enric?">
            </div>
            <p style="margin-top:20px; color:#484f58; font-size:0.9em;">Navegación Protegida por Blue Shield Elite</p>
        </div>

        <iframe id="viewport" src="about:blank"></iframe>
    </div>

    <script>
        const home = document.getElementById('home-screen');
        const viewport = document.getElementById('viewport');

        function openWeb(url) {
            const protected = ['google.com', 'github.com', 'lovable.dev', 'aistudio'];
            const isProtected = protected.some(d => url.includes(d));

            home.classList.add('hidden');
            
            if (isProtected) {
                window.open(url, '_blank', 'width=1200,height=800');
            } else {
                viewport.src = url;
            }
        }

        function navigate(inputId) {
            let val = document.getElementById(inputId).value.trim();
            if (!val) return;
            
            let url = val.includes('.') && !val.includes(' ') ? 
                (val.startsWith('http') ? val : 'https://' + val) : 
                'https://www.bing.com/search?q=' + encodeURIComponent(val); // Bing permite más iframes que Google
            
            openWeb(url);
        }

        function goHome() {
            home.classList.remove('hidden');
            viewport.src = "about:blank";
            document.getElementById('homeSearch').value = "";
            document.getElementById('urlInput').value = "";
        }

        // Listeners para el Enter
        document.getElementById('homeSearch').addEventListener("keypress", (e) => {
            if (e.key === "Enter") navigate('homeSearch');
        });
        document.getElementById('urlInput').addEventListener("keypress", (e) => {
            if (e.key === "Enter") navigate('urlInput');
        });
    </script>
</body>
</html>
